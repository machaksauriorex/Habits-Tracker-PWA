<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1F25"/>
      <stop offset="100%" stop-color="#14161A"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F3D58A"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
  </defs>

  <!-- Fondo cuadrado redondeado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Círculo dorado (moneda) -->
  <circle cx="256" cy="248" r="148" fill="url(#coin)"/>

  <!-- Ranura de la hucha (línea horizontal arriba) -->
  <rect x="210" y="126" width="92" height="18" rx="9" fill="#1C1F25" opacity="0.5"/>

  <!-- Check blanco grueso -->
  <polyline
    points="174,252 228,308 342,188"
    fill="none"
    stroke="white"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Puntos decorativos abajo (racha) -->
  <circle cx="186" cy="410" r="14" fill="#E9C46A" opacity="0.5"/>
  <circle cx="228" cy="410" r="14" fill="#E9C46A" opacity="0.7"/>
  <circle cx="270" cy="410" r="14" fill="#E9C46A" opacity="0.9"/>
  <circle cx="312" cy="410" r="14" fill="#E9C46A"/>
  <circle cx="354" cy="410" r="14" fill="#E9C46A" opacity="0.4"/>
</svg>
